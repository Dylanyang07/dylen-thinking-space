<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dylen的思考空间</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="主导航">
        <a class="brand" href="#/">dylen的思考空间</a>
        <div class="nav-actions">
          <button class="icon-button" id="searchToggle" type="button" aria-label="搜索文章" title="搜索文章">
            <span aria-hidden="true">⌕</span>
          </button>
          <button class="icon-button" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
            <span aria-hidden="true">◐</span>
          </button>
        </div>
      </nav>
      <section class="intro">
        <p class="eyebrow">思考 · 复盘 · 决策</p>
        <h1>把零散判断沉淀成可追踪的认知资产。</h1>
        <p class="intro-copy">这里收纳关于职业、AI、投资和个人成长的长期思考。先记录真实问题，再持续修正判断。</p>
      </section>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="文章分类">
        <div class="panel search-panel" id="searchPanel">
          <label for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="输入标题、正文或 tag" autocomplete="off" />
        </div>
        <div class="panel">
          <h2>分类</h2>
          <div class="tag-list" id="tagList"></div>
        </div>
      </aside>

      <section class="content" id="app" aria-live="polite"></section>
    </main>

    <script src="./posts.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
